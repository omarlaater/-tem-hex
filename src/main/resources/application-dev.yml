spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:template_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoint:
    health:
      show-details: always
