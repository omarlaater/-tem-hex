spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/template_db}
    username: ${DB_USERNAME:template_user}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
