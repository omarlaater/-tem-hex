databaseChangeLog:
  - changeSet:
      id: 001-create-resources-table
      author: template
      changes:
        - createTable:
            tableName: resources
            columns:
              - column:
                  name: resource_id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
